name: Update GitHub Stats

on:
  schedule:
    - cron: '0 6 * * *'   # every day at 06:00 UTC
  workflow_dispatch:       # run manually from the Actions tab
  push:
    branches: [main]
    paths:
      - generate_stats.py  # also re-run when the script itself changes

permissions:
  contents: write          # needed to commit the generated SVGs

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate SVGs
        env:
          # GH_TOKEN must be a Personal Access Token with `repo` scope.
          # Add it in: Settings → Secrets and variables → Actions → New repository secret
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ vars.GH_USERNAME }}
        run: python generate_stats.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          if git diff --staged --quiet; then
            echo "No changes — SVGs are up to date."
          else
            git commit -m "chore: update stats SVGs [skip ci]"
            git push
          fi
